name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Поднимаем Java до 17, чтобы завелся плагин Polyfrost
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Собираем, принудительно удерживая UTF-8
    - name: Build with Gradle
      run: ./gradlew build -Dfile.encoding=UTF-8
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"