name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Используем актуальную v4 для скачивания кода
    - uses: actions/checkout@v4

    # Настраиваем Java и включаем встроенное кэширование Gradle (заменяет старый actions/cache)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # Это автоматически кэширует зависимости БЕЗ вызова старого actions/cache v2!

    # Даем права на запуск gradle-враппера
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Запускаем сборку проекта
    - name: Build with Gradle
      run: ./gradlew build

    # Сохраняем готовый .jar файл используя ОПТИМИЗИРОВАННУЮ v4
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Jar
        path: build/libs/*.jar