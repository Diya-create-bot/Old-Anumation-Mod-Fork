name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Спускаемся на Java 8, которая жизненно необходима для этого мода
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Запускаем сборку, принудительно заставляя Java компилировать в UTF-8
    - name: Build with Gradle
      run: ./gradlew build -Dfile.encoding=UTF-8
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"